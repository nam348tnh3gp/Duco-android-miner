name: Build Duino Miner APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # ============================================================
      # CÀI ĐẶT ANDROID NDK (để build C code)
      # ============================================================
      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
          unzip -q android-ndk-r26c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26c" >> $GITHUB_ENV
          echo "$PWD/android-ndk-r26c/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      # ============================================================
      # BUILD MINER C CHO TẤT CẢ KIẾN TRÚC ANDROID
      # ============================================================
      - name: Build miner for Android (all architectures)
        run: |
          SOURCE_DIR=$PWD
          mkdir -p $SOURCE_DIR/output/{arm64-v8a,armeabi-v7a,x86_64,x86}
          cd $SOURCE_DIR/android/app/src/main/cpp
          
          build_arch() {
            local ARCH=$1
            local CC_ARCH=$2
            local OUTPUT_DIR=$3
            
            echo "🔨 Building for $ARCH..."
            mkdir -p build_$ARCH
            cd build_$ARCH
            
            $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/$CC_ARCH \
              -O3 -Wall -pthread -fPIC \
              -I.. \
              -c ../miner_ffi.c -o miner_ffi.o
            
            $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/$CC_ARCH \
              -shared -fPIC \
              miner_ffi.o \
              -o libminer.so \
              -lm -lc
            
            cp libminer.so $SOURCE_DIR/output/$OUTPUT_DIR/
            cd ..
          }
          
          build_arch "arm64" "aarch64-linux-android21-clang" "arm64-v8a"
          build_arch "arm" "armv7a-linux-androideabi21-clang" "armeabi-v7a"
          build_arch "x86_64" "x86_64-linux-android21-clang" "x86_64"
          build_arch "x86" "i686-linux-android21-clang" "x86"
          
          echo "✅ Build completed for all architectures."

      # ============================================================
      # TẠO FLUTTER PROJECT VÀ COPY SOURCE (ĐÚNG THỨ TỰ)
      # ============================================================
      - name: Create Flutter project and copy sources
        run: |
          SOURCE_DIR=$PWD
          
          # 1. Lưu source code sang thư mục tạm
          mkdir -p /tmp/source_backup
          cp -r $SOURCE_DIR/lib /tmp/source_backup/ 2>/dev/null || echo "No lib folder"
          cp $SOURCE_DIR/pubspec.yaml /tmp/source_backup/ 2>/dev/null || echo "No pubspec.yaml"
          cp -r $SOURCE_DIR/android/app/src/main/cpp /tmp/source_backup/ 2>/dev/null || echo "No cpp folder"
          
          # 2. Tạo Flutter project mới
          flutter create --org com.TGFN --project-name ducominer /tmp/ducominer_temp
          
          # 3. Copy cấu trúc Flutter vào thư mục hiện tại (trừ .git)
          rsync -av --exclude='.git' /tmp/ducominer_temp/ ./
          
          # 4. Copy source code từ backup vào
          cp -r /tmp/source_backup/lib . 2>/dev/null || echo "No lib to copy"
          cp /tmp/source_backup/pubspec.yaml . 2>/dev/null || echo "No pubspec.yaml to copy"
          
          # 5. Copy C files
          mkdir -p android/app/src/main/cpp
          cp /tmp/source_backup/cpp/*.h android/app/src/main/cpp/ 2>/dev/null || true
          cp /tmp/source_backup/cpp/*.c android/app/src/main/cpp/ 2>/dev/null || true
          cp /tmp/source_backup/cpp/CMakeLists.txt android/app/src/main/cpp/ 2>/dev/null || true
          
          # 6. Copy .so files vào jniLibs
          for arch in arm64-v8a armeabi-v7a x86_64 x86; do
            mkdir -p android/app/src/main/jniLibs/$arch
            cp $SOURCE_DIR/output/$arch/libminer.so android/app/src/main/jniLibs/$arch/ 2>/dev/null || true
          done
          
          echo "✅ All sources copied successfully!"

      # ============================================================
      # CẤU HÌNH ANDROID
      # ============================================================
      - name: Configure Android
        run: |
          sed -i 's/applicationId "com.example.*"/applicationId "com.TGFN.ducominer"/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          
          if ! grep -q "packagingOptions" android/app/build.gradle; then
            sed -i '/android {/a \    packagingOptions {\n        jniLibs {\n            useLegacyPackaging = true\n        }\n    }' android/app/build.gradle
          fi
          
          if ! grep -q "INTERNET" android/app/src/main/AndroidManifest.xml; then
            sed -i '/<manifest /a \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          fi
          if ! grep -q "FOREGROUND_SERVICE" android/app/src/main/AndroidManifest.xml; then
            sed -i '/<manifest /a \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' android/app/src/main/AndroidManifest.xml
          fi

      # ============================================================
      # CÀI ĐẶT DEPENDENCIES VÀ BUILD APK
      # ============================================================
      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (full architecture)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ducominer-apk
          path: build/app/outputs/flutter-apk/*.apk
