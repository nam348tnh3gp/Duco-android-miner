name: Build Universal APK (all architectures)

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # Tạo Flutter project mới (giữ lại .github, android cũ sẽ bị xóa)
      - name: Create Flutter project
        run: |
          # Chỉ xóa thư mục của Flutter project (giữ nguyên .github)
          rm -rf ios lib test .dart_tool .packages pubspec.lock
          rm -rf android
          flutter create --org com.TGFN --project-name ducominer .

      # Copy file C và CMakeLists.txt vào android/app/src/main/cpp
      - name: Copy C sources
        run: |
          mkdir -p android/app/src/main/cpp
          cp -f DSHA1.h android/app/src/main/cpp/
          cp -f miner_ffi.c android/app/src/main/cpp/
          cp -f CMakeLists.txt android/app/src/main/cpp/

      # Copy file Dart vào lib (xóa sạch lib cũ và copy mới)
      - name: Copy Dart sources
        run: |
          rm -rf lib
          mkdir -p lib
          cp -f main.dart lib/
          cp -f home_screen.dart lib/
          cp -f miner_bridge.dart lib/

      # Copy pubspec.yaml (nếu có, để ghi đè)
      - name: Copy pubspec.yaml
        run: |
          cp -f pubspec.yaml . || echo "Using default pubspec.yaml"

      # Sửa build.gradle: package name, minSdk, targetSdk, và thêm CMake
      - name: Update build.gradle
        run: |
          sed -i 's/applicationId "com.example.*"/applicationId "com.TGFN.ducominer"/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          # Thêm externalNativeBuild nếu chưa có
          if ! grep -q "externalNativeBuild" android/app/build.gradle; then
            sed -i '/android {/a \    externalNativeBuild {\n        cmake {\n            path "src/main/cpp/CMakeLists.txt"\n        }\n    }' android/app/build.gradle
          fi

      # Cài đặt dependencies
      - name: Install dependencies
        run: flutter pub get

      # Build universal APK
      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ducominer-universal
          path: build/app/outputs/flutter-apk/app-release.apk
