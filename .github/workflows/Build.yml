name: Build Universal APK (all architectures)

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # 1. Tạo Flutter project trong thư mục tạm
      - name: Generate Flutter project
        run: |
          flutter create --org com.TGFN --project-name ducominer /tmp/ducominer_temp

      # 2. Hợp nhất cấu trúc: Copy khung dự án từ thư mục tạm vào thư mục làm việc
      #    (không ghi đè các thư mục chứa mã nguồn đã có như android, lib)
      - name: Merge Flutter project structure
        run: |
          # Copy các file cấu hình cốt lõi, nhưng KHÔNG ghi đè thư mục android/ và lib/ hiện có
          rsync -av --exclude='android' --exclude='lib' --exclude='.git' /tmp/ducominer_temp/ ./

      # 3. Đảm bảo file build.gradle tồn tại và cập nhật cấu hình
      - name: Update android/app/build.gradle
        run: |
          # Kiểm tra file tồn tại sau khi merge
          if [ ! -f "android/app/build.gradle" ]; then
            echo "ERROR: android/app/build.gradle not found after merge!"
            exit 1
          fi
          
          # Cập nhật thông số
          sed -i 's/applicationId "com.example.*"/applicationId "com.TGFN.ducominer"/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          
          # Thêm cấu hình CMake nếu chưa có (vì các file .c đã có trong android/app/src/main/cpp)
          if ! grep -q "externalNativeBuild" android/app/build.gradle; then
            sed -i '/android {/a \    externalNativeBuild {\n        cmake {\n            path "src/main/cpp/CMakeLists.txt"\n        }\n    }' android/app/build.gradle
          fi

      # 4. Đồng bộ dependencies và build
      - name: Install dependencies
        run: flutter pub get

      - name: Build universal APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ducominer-universal
          path: build/app/outputs/flutter-apk/app-release.apk
